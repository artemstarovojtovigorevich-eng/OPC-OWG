services:
  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - app-network

  grafana:
    image: grafana/grafana:11.5.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - grafana-data:/var/lib/grafana

  promtail:
    image: grafana/promtail:3.2.0
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - app-network

  opcua-test-server:
    image: mcr.microsoft.com/iotedge/opc-plc:latest
    container_name: opcua-test-server
    ports:
      - "50000:50000"
    command: >
      --pn=50000
      --autoaccept
      --sph
      --sn=5
      --sr=10
      --st=uint
      --fn=5
      --fr=1
      --ft=uint
      --gn=5
    restart: unless-stopped
    networks:
      - app-network

  opcua-proxy21:
    build:
      context: opcua-proxy21
      dockerfile: Dockerfile
    container_name: opcua-proxy21
    ports:
      - "8080:8080"
    environment:
      - OPC_ENDPOINT=opc.tcp://opcua-test-server:50000
      - UDP_DEST=opcua-proxy12:50001
      - SOURCE_ID=1
      - POLL_INTERVAL=20ms
      - DISCOVER_NODES=true
      - LOG_LEVEL=info
      - LOG_ENCODING=console
    depends_on:
      opcua-test-server:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  opcua-proxy12:
    build:
      context: opcua-proxy12
      dockerfile: Dockerfile
    container_name: opcua-proxy12
    ports:
      - "4841:4841"
      - "50001:50001/udp"
    environment:
      - OPC_ADDR=0.0.0.0
      - OPC_PORT=4841
      - LOG_LEVEL=info
      - LOG_ENCODING=console
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  grafana-data: